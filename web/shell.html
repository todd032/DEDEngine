<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEDEngine</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI Variable Text", "IBM Plex Sans", "Noto Sans KR", sans-serif;
      background: #0f1115;
      color: #eff2f8;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .launcher {
      min-height: calc(100vh - 36px);
      display: grid;
      place-content: center;
      gap: 14px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: #0f1115;
      padding: 24px;
    }

    .launcher h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: 0.05em;
    }

    .launcher p {
      margin: 0;
      color: rgba(239, 242, 248, 0.8);
    }

    .launcher-actions {
      width: min(360px, 84vw);
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .launcher-actions button {
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font: 700 16px/1.2 system-ui, -apple-system, sans-serif;
      color: #0f1115;
      background: #eff2f8;
      cursor: pointer;
    }

    #app-root { display: none; }

    .viewport {
      aspect-ratio: 1360 / 820;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #090b0e;
    }

    #canvas-shell,
    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status-bar,
    .console {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: #151922;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-weight: 700;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #9ee37d;
    }

    #output {
      margin: 0;
      padding: 12px 14px;
      min-height: 108px;
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      font: 13px/1.4 "Cascadia Code", "Consolas", monospace;
    }
  </style>
</head>
<body>
  <main>
    <section class="launcher" id="launcher">
      <h1>DEDEngine</h1>
      <p>실행할 프로토타입을 선택하세요.</p>
      <div class="launcher-actions">
        <button type="button" data-mode="cookie">Cookie on The Roof 실행</button>
        <button type="button" data-mode="mesh">Mesh Slice 실행</button>
      </div>
    </section>

    <div id="app-root">
      <section class="viewport">
        <div id="canvas-shell">
          <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
        </div>
      </section>

      <section class="status-bar">
        <span class="badge" id="status">Booting WebAssembly runtime...</span>
        <p>Hosted on GitHub Pages at <code>/DEDEngine/</code></p>
      </section>

      <section class="console">
        <pre id="output" aria-live="polite"></pre>
      </section>
    </div>
  </main>

  <script>
    const launchMode = new URLSearchParams(window.location.search).get("mode");
    const launcherElement = document.getElementById("launcher");
    const appRoot = document.getElementById("app-root");
    const launchButtons = Array.from(document.querySelectorAll("[data-mode]"));
    const canvasShell = document.getElementById("canvas-shell");
    const statusElement = document.getElementById("status");
    const outputElement = document.getElementById("output");

    launchButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const selectedMode = button.getAttribute("data-mode");
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("mode", selectedMode);
        window.location.href = nextUrl.toString();
      });
    });

    const moduleArgs = [];
    if (launchMode === "cookie" || launchMode === "mesh" || launchMode === "launcher") {
      moduleArgs.push(`--mode=${launchMode}`);
      launcherElement.style.display = "none";
      appRoot.style.display = "grid";
    }

    function appendOutput(text) {
      if (!text) {
        return;
      }

      outputElement.textContent += `${text}\n`;
      outputElement.scrollTop = outputElement.scrollHeight;
    }

    function resizeCanvas() {
      if (!window.Module || !Module.canvas || typeof Module.setCanvasSize !== "function") {
        return;
      }

      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.floor(canvasShell.clientWidth));
      const height = Math.max(240, Math.floor(canvasShell.clientHeight));
      Module.setCanvasSize(Math.floor(width * dpr), Math.floor(height * dpr));
    }

    window.addEventListener("resize", () => window.requestAnimationFrame(resizeCanvas));

    var Module = {
      preRun: [],
      postRun: [() => window.requestAnimationFrame(resizeCanvas)],
      arguments: moduleArgs,
      canvas: (() => {
        const canvas = document.getElementById("canvas");
        canvas.addEventListener("webglcontextlost", (event) => {
          event.preventDefault();
          appendOutput("WebGL context lost. Reload the page to restart the app.");
          statusElement.textContent = "WebGL context lost";
        });
        return canvas;
      })(),
      print: (text) => appendOutput(text),
      printErr: (text) => appendOutput(text),
      setStatus: (text) => {
        statusElement.textContent = text || "Ready";
      },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left);
        if (left > 0) {
          Module.setStatus(`Preparing runtime ${Module.totalDependencies - left}/${Module.totalDependencies}`);
        } else {
          Module.setStatus("Ready");
        }
      },
      onRuntimeInitialized: () => {
        Module.setStatus("Ready");
        resizeCanvas();
      }
    };

    window.onerror = (message) => {
      Module.setStatus("Runtime error");
      appendOutput(`Error: ${message}`);
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
